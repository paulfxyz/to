# fly.toml — Fly.io deployment config for howlr.to API
# App name: howlr-api
# Docs: https://fly.io/docs/reference/configuration/

app = "howlr-api"
primary_region = "cdg"   # Paris — close to Paul's SiteGround server in EU

[build]
  # Uses the auto-detected Node.js buildpack

[env]
  NODE_ENV    = "production"
  PORT        = "3000"
  DATA_DIR    = "/data"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[mounts]]
  source      = "howlr_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
