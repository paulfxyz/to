# fly.toml — Fly.io deployment config for hollr.to API
# App name: hollr-api | Region: cdg (Paris)

app = "hollr-api"
primary_region = "cdg"

[build]

[env]
  NODE_ENV = "production"
  PORT     = "3000"
  DATA_DIR = "/data"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[mounts]]
  source      = "hollr_data"
  destination = "/data"

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
